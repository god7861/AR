<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Куб - WebAR</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
        }
        
        /* === НОВЫЙ ФОН ДЛЯ МОДЕЛИ === */
        .model-container {
            width: 100%;
            height: 500px;
            /* Градиентный фон */
            background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 50%, #fef3c7 100%);
            border-radius: 15px;
            margin-bottom: 20px;
            /* Тень внутри */
            box-shadow: inset 0 0 40px rgba(0,0,0,0.1);
            /* Сетка на фоне (опционально) */
            background-image: 
                linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 50%, #fef3c7 100%),
                linear-gradient(90deg, rgba(255,255,255,0.3) 1px, transparent 1px),
                linear-gradient(rgba(255,255,255,0.3) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }
        
        model-viewer {
            width: 100%;
            height: 100%;
        }
        
        .ar-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: block;
            margin: 20px auto;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .ar-button:active {
            transform: scale(0.98);
        }
        
        .info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .info p {
            color: #666;
            line-height: 1.6;
        }
        
        @media (max-width: 600px) {
            .model-container {
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 3D Куб</h1>
        <p class="subtitle">Крути модель пальцем или смотри в AR</p>
        
        <div class="model-container">
            <model-viewer
                src="cube.glb"
                alt="3D куб"
                ar
                ar-modes="scene-viewer quick-look"
                camera-controls
                auto-rotate
                shadow-intensity="1">
                
                <button slot="ar-button" class="ar-button">
                    👁️ Посмотреть в AR
                </button>
                
            </model-viewer>
        </div>
        
        <div class="info">
            <p><strong>Выполнил:</strong> [Твоё Имя]</p>
            <p><strong>Группа:</strong> [Твоя Группа]</p>
        </div>
    </div>
</body>
</html>
