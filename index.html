!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Пончик - WebAR</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            max-width: 700px;
            width: 100%;
            overflow: hidden;
        }
        .header {
            padding: 20px 24px 10px;
            text-align: center;
        }
        .header h1 { font-size: 1.8rem; color: #2d3748; margin-bottom: 4px; }
        .header p { color: #718096; font-size: 0.95rem; }
        
        .viewer-wrap {
            position: relative;
            height: 450px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
        }
        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
        }
        
        .bar {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }
        .bar.show { display: block; }
        .bar-fill {
            height: 100%;
            width: 0%;
            background: #63b3ed;
            transition: width 0.2s;
        }
        
        .error-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #e53e3e;
            color: #fff;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
            text-align: center;
        }
        .error-msg.show { display: block; }
        
        .footer {
            padding: 16px 24px 24px;
            text-align: center;
            color: #4a5568;
            font-size: 0.9rem;
        }
        .footer strong { color: #2d3748; }
        
        @media (max-width: 600px) {
            .viewer-wrap { height: 350px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>🍩 3D Пончик</h1>
            <p>Вращай модель или открой в дополненной реальности</p>
        </div>
        
        <div class="viewer-wrap">
            <model-viewer
                id="viewer"
                src="model.glb"
                alt="3D модель пончика"
                ar
                ar-modes="webxr scene-viewer quick-look"
                ar-scale="auto"
                ar-placement="floor"
                camera-controls
                auto-rotate
                shadow-intensity="1"
                exposure="1"
                environment-image="neutral"
                camera-orbit="45deg 55deg auto"
                min-camera-orbit="auto auto 2m"
                max-camera-orbit="auto auto 12m"
                interaction-prompt="auto">
                
                <div slot="progress-bar" class="bar show">
                    <div class="bar-fill"></div>
                </div>
                
                <div slot="error-message" class="error-msg">
                    ⚠️ Ошибка загрузки<br>
                    <small>Проверьте имя файла model.glb</small>
                </div>
            </model-viewer>
        </div>
        
        <div class="footer">
            <p><strong>Выполнил:</strong> Лун Артём Андреевич | <strong>Группа:</strong> БЗИ43ТВР</p>
        </div>
    </div>

    <script>
        const viewer = document.getElementById('viewer');
        const bar = viewer.querySelector('.bar-fill');
        const barWrap = viewer.querySelector('.bar');
        const err = viewer.querySelector('.error-msg');

        viewer.addEventListener('progress', e => {
            bar.style.width = `${e.detail.totalProgress * 100}%`;
        });

        viewer.addEventListener('load', () => {
            barWrap.classList.remove('show');
            err.classList.remove('show');
        });

        viewer.addEventListener('error', () => {
            barWrap.classList.remove('show');
            err.classList.add('show');
        });
    </script>
</body>
</html>
