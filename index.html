<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Куб - WebAR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }
        
        .model-container {
            width: 100%;
            height: 500px;
            background: #f5f5f5;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        model-viewer {
            width: 100%;
            height: 100%;
        }
        
        .info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .info h3 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .info p {
            color: #666;
            line-height: 1.6;
        }
        
        .ar-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: block;
            margin: 20px auto;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: transform 0.2s;
        }
        
        .ar-button:active {
            transform: scale(0.98);
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.5em;
            }
            
            .model-container {
                height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 3D Куб</h1>
        <p class="subtitle">Покрути модель или посмотри в AR</p>
        
        <div class="model-container">
            <model-viewer
                src="cube.glb"
                alt="3D модель куба"
                ar
                ar-modes="scene-viewer quick-look"
                camera-controls
                auto-rotate
                auto-rotate-delay="500"
                rotation-per-second="30deg"
                shadow-intensity="1"
                camera-orbit="45deg 55deg 105%">
                
                <button slot="ar-button" class="ar-button">
                    👁️ Посмотреть в AR
                </button>
                
            </model-viewer>
        </div>
        
        <div class="info">
            <h3>📝 Описание</h3>
            <p>
                Простая 3D модель куба в формате GLB.
                Используйте дополненную реальность для просмотра в вашем пространстве.
            </p>
            <p style="margin-top: 10px;">
                <strong>Выполнил:</strong> [Твоё Имя]<br>
                <strong>Группа:</strong> [Твоя Группа]
            </p>
        </div>
    </div>
    
    <script type="module" src="https://unpkg.com/@google/model-viewer@3.1.1/dist/model-viewer.min.js"></script>
</body>
</html>
